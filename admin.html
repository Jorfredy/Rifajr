<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Seguro - JR RIFAS TJ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2e4453; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        .admin-panel { display: none; width: 95%; max-width: 1000px; background: white; color: #333; border-radius: 15px; padding: 20px; margin: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login { background: #558c70; color: white; font-size: 16px; }
        .btn-pago { background: #28a745; color: white; margin-bottom: 5px; }
        .btn-libre { background: #dc3545; color: white; }
        .btn-peligro { background: #dc3545; color: white; padding: 8px 15px; width: auto; }
        .btn-secundario { background: #eee; color: #333; padding: 8px 15px; width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header-botones { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="login-card">
        <h2 style="color: #2e4453; margin-top: 0;">Panel JR RIFAS</h2>
        <p style="color: #666; font-size: 14px;">Solo personal autorizado</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn-login" id="btn-entrar">INICIAR SESIÓN</button>
        <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="admin-section" class="admin-panel">
        <div class="header-admin">
            <h2 style="color: #2e4453; margin: 0;">Control de Boletos - JR RIFAS TJ</h2>
            <div class="header-botones">
                <!-- Botón de Liberar Todos agregado aquí -->
                <button class="btn-peligro" onclick="liberarTodos()">⚠️ Liberar Todos</button>
                <button class="btn-secundario" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>WhatsApp</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCsjIOcnEFLfqUC5hbVGNh6ti3v1dHGcCc",
      authDomain: "rifas-jr-tj.firebaseapp.com",
      projectId: "rifas-jr-tj",
      storageBucket: "rifas-jr-tj.firebasestorage.app",
      messagingSenderId: "229988706437",
      appId: "1:229988706437:web:86c79a2b8139b9a18961ec"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const nombreColeccion = "rifa_500";
    
    // Variable global para almacenar temporalmente los IDs de los boletos ocupados
    window.boletosOcupados = [];

    // Lógica de Inicio de Sesión
    document.getElementById('btn-entrar').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (error) {
            errorMsg.innerText = "Correo o contraseña incorrectos.";
        }
    };

    // Detectar si hay sesión activa
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'block';
            document.body.style.alignItems = 'flex-start';
            cargarDatos();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('admin-section').style.display = 'none';
            document.body.style.alignItems = 'center';
        }
    });

    window.cerrarSesion = () => signOut(auth);

    function cargarDatos() {
        onSnapshot(collection(db, nombreColeccion), (snap) => {
            const cuerpo = document.getElementById('cuerpo-tabla');
            cuerpo.innerHTML = '';
            let docs = [];
            
            // Limpiamos el arreglo en cada actualización
            window.boletosOcupados = []; 
            
            snap.forEach(d => { 
                if(d.data().estado !== 'disponible') {
                    docs.push({id: d.id, ...d.data()}); 
                    // Guardamos el ID del boleto ocupado
                    window.boletosOcupados.push(d.id); 
                }
            });
            
            docs.sort((a,b) => parseInt(a.id) - parseInt(b.id)).forEach(data => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${data.id}</b></td>
                    <td>${data.nombre}</td>
                    <td>${data.telefono}</td>
                    <td style="color:${data.estado === 'vendido' ? 'green' : 'orange'}"><b>${data.estado.toUpperCase()}</b></td>
                    <td>
                        ${data.estado === 'apartado' ? `<button class="btn-pago" onclick="marcarVendido('${data.id}')">Vender</button>` : ''}
                        <button class="btn-libre" onclick="liberar('${data.id}')">Liberar</button>
                    </td>
                `;
                cuerpo.appendChild(tr);
            });
        });
    }

    window.marcarVendido = async (id) => { await updateDoc(doc(db, nombreColeccion, id), { estado: 'vendido' }); };
    window.liberar = async (id) => { if(confirm("¿Liberar número?")) await setDoc(doc(db, nombreColeccion, id), { estado: 'disponible' }); };

    // --- NUEVA FUNCIÓN: LIBERAR TODOS ---
    window.liberarTodos = async () => {
        if (window.boletosOcupados.length === 0) {
            alert("ℹ️ La tabla ya está vacía. No hay boletos apartados ni vendidos.");
            return;
        }

        const seguro = confirm("⚠️ ¡ALERTA MÁXIMA!\n\n¿Estás seguro de que quieres liberar TODOS los números registrados en esta tabla?\n\nEsta acción dejará todos los boletos disponibles y no se puede deshacer.");
        
        if (seguro) {
            const password = prompt("Por seguridad, ingresa tu clave de administrador para confirmar:");
            
            if (password === "AdminJR") { // <-- Aquí defines tu contraseña de seguridad
                try {
                    alert("⏳ Liberando boletos, por favor espera un momento...");
                    
                    // Recorremos todos los IDs ocupados y los actualizamos a 'disponible' en Firebase
                    for (let id of window.boletosOcupados) {
                        await setDoc(doc(db, nombreColeccion, id), { estado: 'disponible' });
                    }
                    
                    alert("✅ ¡Éxito! Todos los boletos han sido liberados y el sistema está listo para una nueva rifa.");
                } catch (error) {
                    alert("❌ Hubo un error al conectar con la base de datos: " + error.message);
                }
            } else if (password !== null) {
                alert("❌ Contraseña incorrecta. Acción cancelada.");
            }
        }
    };
</script>
</body>
</html>
